<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="天气内容页，兼容旧天气入口">
  <link rel="canonical" href="https://aidenzou.cn/content">
  <title>天气内容页</title>
  <style>
    :root {
      color-scheme: light;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #f5f7ff 0%, #eef2ff 100%);
      color: #1a2340;
    }
    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 16px 40px rgba(73, 88, 150, 0.08);
    }
    .header strong {
      display: block;
      font-size: 18px;
    }
    .header span {
      display: block;
      margin-top: 4px;
      font-size: 14px;
      color: #5c678d;
    }
    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .link {
      color: #4057d6;
      text-decoration: none;
      font-weight: 600;
    }
    .frame {
      width: 100%;
      min-height: calc(100vh - 124px);
      border: 0;
      border-radius: 24px;
      background: white;
      box-shadow: 0 20px 50px rgba(73, 88, 150, 0.12);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <strong>天气内容页</strong>
        <span>新增页面 URL，内部复用现有 /weather 动态能力</span>
      </div>
      <div class="links">
        <a class="link" href="/weather">旧入口 /weather</a>
        <a class="link" href="/s">签名预览入口 /s</a>
      </div>
    </div>
    <iframe class="frame" src="/weather" title="Weather content"></iframe>
  </div>
</body>
</html>
